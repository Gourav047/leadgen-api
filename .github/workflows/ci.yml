name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  # ---------------------------------------------------------------------------
  # Unit Tests (no database required — PrismaService is mocked)
  # ---------------------------------------------------------------------------
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run unit tests
        run: npm test
        env:
          # Satisfies Joi validation when NestJS initialises during tests
          DATABASE_URL: postgresql://postgres:ci_password@localhost:5432/leadboost_test
          JWT_SECRET: ci_jwt_secret_that_is_at_least_32_chars_long
          NODE_ENV: test

  # ---------------------------------------------------------------------------
  # TypeScript type check (no compilation output needed)
  # ---------------------------------------------------------------------------
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

  # ---------------------------------------------------------------------------
  # Docker build validation — only on pushes (not PRs) to save CI minutes
  # Runs after unit tests and typecheck pass
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-unit, typecheck]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          # Cache Docker layers between CI runs for faster rebuilds
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: leadboost-api:${{ github.sha }}
